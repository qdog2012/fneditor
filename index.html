<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <title>FnEditor</title>
    <script>
      (() => {
        const externalOpenKeys = ["open", "file", "path", "filepath", "filePath", "absolutePath", "target", "uri"];

        const decodeExternalValue = (value) => {
          let decoded = value.trim();
          for (let index = 0; index < 2; index += 1) {
            try {
              const next = decodeURIComponent(decoded).trim();
              if (next === decoded) {
                break;
              }
              decoded = next;
            } catch {
              break;
            }
          }

          if (decoded.startsWith("file://")) {
            try {
              return decodeURIComponent(new URL(decoded).pathname);
            } catch {
              return decoded.replace(/^file:\/+/, "/");
            }
          }

          return decoded;
        };

        const isAbsolutePath = (value) => value.startsWith("/") || /^[A-Za-z]:[\\/]/.test(value);
        const hasExternalOpenPath = (search) => {
          const params = new URLSearchParams(search);
          for (const key of externalOpenKeys) {
            const value = params.get(key);
            if (value && isAbsolutePath(decodeExternalValue(value))) {
              return true;
            }
          }

          for (const value of params.values()) {
            if (isAbsolutePath(decodeExternalValue(value))) {
              return true;
            }
          }

          return false;
        };

        let theme = "dark";
        try {
          theme = window.localStorage.getItem("fncode.theme") === "light" ? "light" : "dark";
        } catch {
          theme = "dark";
        }

        document.documentElement.dataset.fncodeTheme = theme;
        document.documentElement.style.colorScheme = theme;

        const searches = [window.location.search];
        const hash = window.location.hash.startsWith("#") ? window.location.hash.slice(1) : window.location.hash;
        const hashQueryIndex = hash.indexOf("?");
        if (hash.startsWith("?")) {
          searches.push(hash);
        } else if (hashQueryIndex >= 0) {
          searches.push(hash.slice(hashQueryIndex));
        }

        if (searches.some(hasExternalOpenPath)) {
          document.documentElement.dataset.fncodeExternalOpen = "true";
        }
      })();
    </script>
    <style>
      html {
        --preboot-bg: #1e1f22;
        --preboot-text: #d7dae0;
        --preboot-activity: #18191d;
        --preboot-activity-border: #17191d;
        --preboot-sidebar: #25272c;
        --preboot-sidebar-border: #383d45;
        --preboot-surface: #202227;
        --preboot-border: #30343b;
        --preboot-placeholder: #343842;
      }

      html[data-fncode-theme="light"] {
        --preboot-bg: #fbfcfd;
        --preboot-text: #23272f;
        --preboot-activity: #e9edf2;
        --preboot-activity-border: #c4ccd8;
        --preboot-sidebar: #f2f4f7;
        --preboot-sidebar-border: #c9d1dc;
        --preboot-surface: #eef1f5;
        --preboot-border: #d8dee7;
        --preboot-placeholder: #d7dee8;
      }

      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--preboot-bg);
        color: var(--preboot-text);
        font-family: "Segoe UI", "Microsoft YaHei UI", sans-serif;
      }

      .preboot {
        display: grid;
        grid-template-columns: 48px 306px minmax(0, 1fr);
        width: 100vw;
        height: 100vh;
        background: var(--preboot-bg);
      }

      html[data-fncode-external-open="true"] .preboot {
        grid-template-columns: 48px 0 minmax(0, 1fr);
      }

      .preboot-activity {
        background: var(--preboot-activity);
        border-right: 1px solid var(--preboot-activity-border);
      }

      .preboot-sidebar {
        background: var(--preboot-sidebar);
        border-right: 1px solid var(--preboot-sidebar-border);
        padding: 14px;
      }

      html[data-fncode-external-open="true"] .preboot-sidebar {
        display: none;
      }

      .preboot-main {
        display: grid;
        grid-template-rows: 40px 35px 1fr 24px;
        min-width: 0;
      }

      .preboot-strip,
      .preboot-tabs,
      .preboot-status {
        border-bottom: 1px solid var(--preboot-border);
        background: var(--preboot-surface);
      }

      .preboot-status {
        border-top: 1px solid var(--preboot-border);
        border-bottom: 0;
      }

      .preboot-line,
      .preboot-title {
        height: 10px;
        border-radius: 2px;
        background: var(--preboot-placeholder);
      }

      .preboot-title {
        width: 88px;
        margin-bottom: 18px;
      }

      .preboot-line {
        width: 100%;
        margin-bottom: 10px;
      }

      .preboot-line:nth-child(3) {
        width: 70%;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="preboot" aria-label="FnEditor 正在加载">
        <div class="preboot-activity"></div>
        <div class="preboot-sidebar">
          <div class="preboot-title"></div>
          <div class="preboot-line"></div>
          <div class="preboot-line"></div>
          <div class="preboot-line"></div>
        </div>
        <div class="preboot-main">
          <div class="preboot-strip"></div>
          <div class="preboot-tabs"></div>
          <div></div>
          <div class="preboot-status"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
